openapi: 3.0.3
info:
	title: Docfish Backend API
	version: 1.0.0
	description: |
		Contract-first API for Docfish invoice extraction.

		Upload processing is asynchronous and returns `202 Accepted` with upload job metadata.
servers:
	- url: http://localhost:5000
paths:
	/health:
		get:
			summary: Health check
			responses:
				'200':
					description: Service is healthy

	/api/v1/documents:
		post:
			summary: Upload invoice PDFs (single or bulk, async)
			description: Returns immediately with upload job metadata. Processing continues in background.
			requestBody:
				required: true
				content:
					multipart/form-data:
						schema:
							type: object
							properties:
								files:
									type: array
									items:
										type: string
										format: binary
								file:
									type: string
									format: binary
								autoProcess:
									type: boolean
									default: true
								extractionMode:
									type: string
									enum: [fast, accurate]
									default: accurate
								runValidation:
									type: boolean
									default: true
			responses:
				'202':
					description: Upload accepted; jobs created
					content:
						application/json:
							schema:
								type: object
								properties:
									uploads:
										type: array
										items:
											type: object
											properties:
												id:
													type: string
												name:
													type: string
												size:
													type: number
												status:
													type: string
													enum: [uploading, uploaded, processing, done, error]
												progress:
													type: number
												documentId:
													type: string
												errorMessage:
													type: string

	/api/v1/documents/upload:
		post:
			summary: Backward-compatible async upload alias
			description: Alias for `/api/v1/documents` with the same async `202 Accepted` contract.
			responses:
				'202':
					description: Upload accepted

	/api/v1/uploads/{uploadId}/status:
		get:
			summary: Get async upload job status
			parameters:
				- in: path
					name: uploadId
					required: true
					schema:
						type: string
			responses:
				'200':
					description: Upload status payload

	/api/v1/documents/{id}/download:
		get:
			summary: Download source PDF or structured JSON
			parameters:
				- in: path
					name: id
					required: true
					schema:
						type: string
				- in: query
					name: format
					required: true
					schema:
						type: string
						enum: [pdf, json]
			responses:
				'200':
					description: Downloaded content
				'400':
					description: Invalid format

	/api/v1/prompts/{id}/test:
		post:
			summary: Test a specific prompt version against sample invoice text
			requestBody:
				required: true
				content:
					application/json:
						schema:
							type: object
							required: [sampleText]
							properties:
								sampleText:
									type: string
			parameters:
				- in: path
					name: id
					required: true
					schema:
						type: string
			responses:
				'200':
					description: Prompt test result
					content:
						application/json:
							schema:
								type: object
								properties:
									promptId:
										type: string
									promptVersion:
										type: integer
									extractionMethod:
										type: string
										enum: [llm, heuristic, ocr_heuristic, manual]
									modelBacked:
										type: boolean
									degradedMode:
										type: boolean
									degradedModeReason:
										type: string
										nullable: true
									processingTime:
										type: string
									processingTimeMs:
										type: integer
									overallConfidence:
										type: number
									normalizedOutput:
										type: object
									rawModelOutput:
										type: string
										nullable: true
									rawOutput:
										type: string
									extractedFields:
										type: object
									validationResults:
										type: array
										items:
											type: object
											properties:
												passed:
													type: boolean
												title:
													type: string
												message:
													type: string
												severity:
													type: string
													enum: [ok, warning, error]
												field:
													type: string
													nullable: true
												code:
													type: string
													nullable: true
